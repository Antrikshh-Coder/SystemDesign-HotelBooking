<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Available Rooms - StayEase</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    #se-rooms-grid {
      display: flex;
      flex-direction: column;
      gap: 2rem;
      margin-top: 2.5rem;
    }
  </style>
</head>
<body>

  <header>
    <nav class="nav-container" id="se-global-navbar"></nav>
  </header>

  <main id="se-rooms-section">
    <!-- Header visual spot populated dynamically -->
    <div>
      <a href="hotels.html" style="text-decoration: none; font-size: 0.875rem; color: #64748b; font-weight: 600; display: inline-flex; align-items: center; gap: 0.25rem; margin-bottom: 1rem;">← Return to Hotels</a>
      <h1 id="se-hotel-rooms-title" style="font-size: 2.5rem; color: var(--color-primary);">Select Accommodations</h1>
      <p id="se-hotel-rooms-location" style="color: #64748b; font-size: 1rem; margin-top: 0.25rem;">📍 Loading hotel location details...</p>
    </div>

    <!-- Dynamic list of Room card blocks -->
    <div id="se-rooms-grid"></div>
  </main>

  <footer id="se-global-footer"></footer>

  <script src="js/app.js"></script>
  <script src="js/booking.js"></script>
</body>
</html>
