<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Complete Reservation - StayEase</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header>
    <nav class="nav-container" id="se-global-navbar"></nav>
  </header>

  <main style="max-width: 1000px;">
    <div style="margin-bottom: 2rem;">
      <h1 style="font-size: 2rem; color: var(--color-primary);">Complete Your Stay Booking</h1>
      <p style="color: #64748b;">Review room accommodations select check-in check-out calendars to confirm registration.</p>
    </div>

    <div class="checkout-shell">
      
      <!-- Booking Forms panel -->
      <section style="background: white; border: 1px solid #e2e8f0; border-radius: var(--radius-md); padding: 2rem;" class="shadow-md">
        <h2 style="font-size: 1.25rem; font-family: var(--font-display); border-b pb-3 mb-4;">Guest Details & Stay Calendar</h2>
        
        <form id="se-booking-form" class="space-y-4" style="display: flex; flex-direction: column; gap:1.25rem;">
          
          <div class="grid grid-cols-2 gap-4" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
            <div>
              <label class="block text-xs font-bold uppercase mb-1 text-slate-500">Check-in Date</label>
              <input type="date" id="booking-checkin" class="input-field" required>
            </div>
            <div>
              <label class="block text-xs font-bold uppercase mb-1 text-slate-500">Check-out Date</label>
              <input type="date" id="booking-checkout" class="input-field" required>
            </div>
          </div>

          <div>
            <label class="block text-xs font-bold uppercase mb-1 text-slate-500">Number of Staying Guests</label>
            <select id="booking-guests" class="input-field" required>
              <option value="1">1 Guest</option>
              <option value="2">2 Guests</option>
              <option value="3">3 Guests</option>
              <option value="4">4 Guests or Suite Pack</option>
            </select>
          </div>

          <div style="border-t pt-4 mt-2">
            <h3 style="font-size: 1rem; color: var(--color-primary); margin-bottom: 0.75rem;">Occupants Identification</h3>
            <div style="display: flex; flex-direction: column; gap: 1rem;">
              <div>
                <label class="block text-xs font-semibold text-slate-400 mb-1">Full Legal Name</label>
                <input type="text" id="booking-guest-name" placeholder="Aarav Sharma" class="input-field" required>
              </div>
              <div>
                <label class="block text-xs font-semibold text-slate-400 mb-1">Email Address</label>
                <input type="email" id="booking-guest-email" placeholder="aarav@stayease.com" class="input-field" required>
                <p style="font-size: 0.6875rem; color: #94a3b8; margin-top: 0.25rem;">Stay confirmation details will be directed to this address.</p>
              </div>
            </div>
          </div>

          <div style="padding-top: 1.5rem;">
            <button type="submit" class="btn bg-primary text-white w-full">Proceed to Verification & Payment</button>
          </div>

        </form>
      </section>

      <!-- Selected items summaries sidebar -->
      <aside>
        <h3 style="font-size: 1.15rem; color: var(--color-primary); margin-bottom: 1rem;">Booking Details Summary</h3>
        <div id="se-checkout-room-summary"></div>
      </aside>

    </div>
  </main>

  <footer id="se-global-footer"></footer>

  <script src="js/app.js"></script>
  <script src="js/booking.js"></script>
</body>
</html>
